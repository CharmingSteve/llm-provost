name: Build Golden AMI

on:
  workflow_dispatch:
  push:
    branches:
      - add-ami
    paths:
      - .github/workflows/build-ami.yml
      - scripts/build_ami.sh
      - version.txt

permissions:
  id-token: write
  contents: read

jobs:
  build-ami:
    name: Build AMI via AWS CLI + SSM
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      INSTANCE_PROFILE_NAME: ${{ vars.INSTANCE_PROFILE_NAME != '' && vars.INSTANCE_PROFILE_NAME || secrets.INSTANCE_PROFILE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          set -xe
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Lint AMI build script
        run: |
          set -xe
          shellcheck scripts/build_ami.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Read version and timestamp
        run: |
          set -xe
          VERSION="$(tr -d '\r\n' < version.txt)"
          TIMESTAMP="$(date -u +%Y%m%d%H%M%S)"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"

      - name: Validate required workflow inputs
        run: |
          set -xe
          if [[ -z "${INSTANCE_PROFILE_NAME}" ]]; then
            discovered_profile="$(aws iam list-instance-profiles --query 'InstanceProfiles[].InstanceProfileName' --output text | tr '\t' '\n' | grep -E 'ssm|SSM|ec2|EC2' | head -n 1 || true)"
            if [[ -z "${discovered_profile}" ]]; then
              discovered_profile="$(aws iam list-instance-profiles --query 'InstanceProfiles[0].InstanceProfileName' --output text)"
            fi

            if [[ -z "${discovered_profile}" || "${discovered_profile}" == "None" ]]; then
              echo "No usable IAM instance profile found. Set repository variable INSTANCE_PROFILE_NAME or secret INSTANCE_PROFILE_NAME." >&2
              exit 1
            fi

            echo "INSTANCE_PROFILE_NAME=${discovered_profile}" >> "$GITHUB_ENV"
          else
            echo "INSTANCE_PROFILE_NAME=${INSTANCE_PROFILE_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Build and bake AMI
        env:
          BUILD_STATE_FILE: ${{ runner.temp }}/ami-build-state.env
        run: |
          set -xe
          chmod +x scripts/build_ami.sh
          scripts/build_ami.sh

      - name: Cleanup fallback (always)
        if: always()
        env:
          BUILD_STATE_FILE: ${{ runner.temp }}/ami-build-state.env
        run: |
          set -xe
          if [[ -f "${BUILD_STATE_FILE}" ]]; then
            # shellcheck source=/dev/null
            source "${BUILD_STATE_FILE}"
          fi

          if [[ -n "${INSTANCE_ID:-}" ]]; then
            aws --region "${AWS_REGION}" --no-cli-pager --debug ec2 terminate-instances --instance-ids "${INSTANCE_ID}" >/dev/null 2>&1 || true
            aws --region "${AWS_REGION}" --no-cli-pager --debug ec2 wait instance-terminated --instance-ids "${INSTANCE_ID}" >/dev/null 2>&1 || true
          fi

          if [[ -n "${SECURITY_GROUP_ID:-}" ]]; then
            aws --region "${AWS_REGION}" --no-cli-pager --debug ec2 delete-security-group --group-id "${SECURITY_GROUP_ID}" >/dev/null 2>&1 || true
          fi

      - name: Summarize result
        if: success()
        env:
          BUILD_STATE_FILE: ${{ runner.temp }}/ami-build-state.env
        run: |
          set -xe
          if [[ -f "${BUILD_STATE_FILE}" ]]; then
            # shellcheck source=/dev/null
            source "${BUILD_STATE_FILE}"
            echo "AMI_ID=${AMI_ID}" >> "$GITHUB_STEP_SUMMARY"
          fi
