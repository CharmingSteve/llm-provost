worker_processes 1;
pid /tmp/nginx.pid;

env LLM_API_URL;
env LLM_API_KEY;
env MCP_ROUTING_TABLE_PATH;

error_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_nginx_error info;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    lua_shared_dict rules 1m;
    lua_shared_dict rate_limit 1m;
    lua_package_path "/etc/nginx/lua/?.lua;;";

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    client_max_body_size 1m;
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    log_format main_json escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":"$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"user_id":"$provost_user_id",'
      '"customer_id":"$provost_customer_id",'
      '"conversation_id":"$provost_conversation_id",'
      '"request_id":"$request_id"'
    '}';

    init_worker_by_lua_block {
        require("rule_loader")
    }

    server {
        listen 8000;
        server_name localhost;

        access_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_access main_json;
        error_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_error info;

        set $provost_user_id "steve";
        set $provost_customer_id "craig";
        set $provost_conversation_id "none";
        set $llm_target_url "";

        add_header X-Provost-Request-Id $request_id always;
        add_header X-Provost-User-Id $provost_user_id always;
        add_header X-Provost-Customer-Id $provost_customer_id always;
        add_header X-Provost-Conversation-Id $provost_conversation_id always;

        location = /health {
            access_log off;
            return 200 "ok\n";
        }

        location = /v1/chat/completions {
            access_by_lua_file /etc/nginx/lua/http_policy.lua;

            proxy_pass $llm_target_url;
            proxy_ssl_server_name on;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Provost-Request-Id $request_id;
            proxy_set_header Authorization $http_authorization;

            log_by_lua_file /etc/nginx/lua/audit_error.lua;
        }

        location ~ ^/mcp/(.+)$ {
            access_by_lua_file /etc/nginx/lua/http_policy.lua;
            content_by_lua_file /etc/nginx/lua/mcp_proxy.lua;
            log_by_lua_file /etc/nginx/lua/audit_error.lua;
        }

        location / {
            return 404;
        }
    }
}