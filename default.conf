worker_processes  1;
pid /tmp/nginx.pid;

error_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_nginx_error info;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ------------------------------------------------------------------
    # Dynamic Rules Engine
    # Stores the hot-reloaded JSON rule set so every worker can access
    # it without touching disk on each request.
    # ------------------------------------------------------------------
    lua_shared_dict rules 1m;
    lua_shared_dict rate_limit 1m;
    lua_shared_dict provost_secrets 1m;

    # Identity and request context store
    # Maps provost_request_id -> {user, machine, timestamp}
    lua_shared_dict provost_ctx 10m;

    # Cache the provost token in shared memory at startup to avoid
    # per-request file I/O on the hot path.
    init_by_lua_block {
        local f = io.open("/run/secrets/provost_token", "r")
        if f then
            local token = f:read("*l")
            f:close()
            ngx.shared.provost_secrets:set("token", token)
        else
            ngx.log(ngx.ERR, "Failed to load provost token on startup")
        end
    }

    # Let OpenResty workers find the Lua modules mounted at /etc/nginx/lua.
    lua_package_path "/etc/nginx/lua/?.lua;;";
    client_max_body_size 1m;
    # Use tmpfs-backed paths for nginx temporary files when rootfs is read-only.
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # The ultimate audit ledger format
    log_format json_full escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"provost_request_id":"$provost_req_id",'
      '"provost_user":"$http_x_provost_user",'
      '"provost_machine":"$http_x_provost_machine",'
      '"request_body":"$req_body",'
      '"resp_body":"$resp_body"'
    '}';

    # ------------------------------------------------------------------
    # Rule hot-reload: start the background timer in every worker so
    # rules.json is loaded immediately and re-checked every 10 seconds.
    # No nginx reload/HUP is required to pick up rule changes.
    # ------------------------------------------------------------------
    init_worker_by_lua_block {
        require("rule_loader")
        local http_policy = require("http_policy")
        http_policy.prime_account_id_cache()
    }

    # ==================================================================
    # LLM-TO-MCP BOUNDARY: INBOUND FIREWALL
    # ==================================================================
    server {
        listen 8000;
        server_name localhost;

        access_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_llm_to_mcp_access json_full;
        error_log  syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_mcp_to_llm_error info;

        set $req_body "";
        set $resp_body "";        set $provost_req_id "";
        location / {
            lua_need_request_body on;

            # --- THE CIRCUIT BREAKER (rules-engine driven) ---
            access_by_lua_block {
                local cjson = require "cjson.safe"
                local audit_error = require "audit_error"
                local headers = ngx.req.get_headers() or {}
                local early_request_id = ngx.var.http_x_provost_request_id
                    or headers["X-Provost-Request-Id"]
                    or headers["x-provost-request-id"]
                    or ngx.var.request_id
                    or (ngx.now() * 1000000 .. "-" .. math.random(100000, 999999))

                ngx.var.provost_req_id = early_request_id
                ngx.req.set_header("X-Provost-Request-Id", early_request_id)

                local function reject(status_code, error_code, detail, opts)
                    opts = opts or {}
                    audit_error.emit("provost_mcp_to_llm_error", status_code, error_code, detail, {
                        request_id = early_request_id,
                    })
                    ngx.status = status_code
                    ngx.header["Content-Type"] = "application/json"
                    -- Ensure policy 403 responses are not interpreted as auth challenges.
                    ngx.header["WWW-Authenticate"] = nil
                    local response_body
                    if type(opts.response_body) == "string" and opts.response_body ~= "" then
                        response_body = opts.response_body
                    elseif detail and detail ~= "" then
                        response_body = cjson.encode({ error = error_code, detail = detail })
                    else
                        response_body = cjson.encode({ error = error_code })
                    end
                    ngx.var.resp_body = response_body or ""
                    ngx.say(response_body)
                    return ngx.exit(status_code)
                end

                local expected_token = ngx.shared.provost_secrets:get("token")
                if not expected_token then
                    return reject(500, "PROVOST_TOKEN_NOT_LOADED", "Token missing from shared dict")
                end

                local provided_token = ngx.var.http_x_provost_token
                local authorization = ngx.var.http_authorization
                local provost_user = ngx.var.http_x_provost_user
                local provost_machine = ngx.var.http_x_provost_machine

                if (not provided_token or provided_token == "") and authorization and authorization ~= "" then
                    local bearer_token = authorization:match("^[Bb][Ee][Aa][Rr][Ee][Rr]%s+(.+)$")
                    if not bearer_token or bearer_token == "" then
                        return reject(401, "MALFORMED_BEARER_TOKEN", "")
                    end

                    local token_value, token_exp = bearer_token:match("^(.-)|exp=(%d+)$")
                    if token_exp and tonumber(token_exp) and tonumber(token_exp) < ngx.time() then
                        return reject(401, "EXPIRED_BEARER_TOKEN", "")
                    end

                    provided_token = (token_value and token_value ~= "") and token_value or bearer_token
                end

                if not expected_token or expected_token == "" then
                    return reject(500, "PROVOST_TOKEN_EMPTY", "")
                end

                if not provided_token or provided_token == "" then
                    return reject(401, "MISSING_PROVOST_TOKEN", "")
                end

                if provided_token ~= expected_token then
                    return reject(403, "INVALID_PROVOST_TOKEN", "")
                end

                if not provost_user or provost_user == "" then
                    return reject(400, "MISSING_PROVOST_USER", "")
                end

                if not provost_machine or provost_machine == "" then
                    return reject(400, "MISSING_PROVOST_MACHINE", "")
                end

                local rate_limit = require "rate_limit"
                if rate_limit.is_cooldown_active() then
                    return reject(429, "PROVOST_COOLDOWN_ACTIVE", "Upstream 429 cooldown active")
                end

                if rate_limit.is_remaining_low() then
                    return reject(429, "PROVOST_RATE_LIMIT_LOW", "Upstream quota is below safe threshold")
                end

                local raw_rules = ngx.shared.rules:get("rules")
                local rules = (raw_rules and cjson.decode(raw_rules)) or {}
                local rate_key = ngx.var.http_authorization or ngx.var.remote_addr or "anonymous"
                local is_exceeded, configured_rpm = rate_limit.is_inbound_request_rate_exceeded(rules, rate_key)
                if is_exceeded then
                    return reject(429, "PROVOST_INBOUND_RATE_LIMIT", "Inbound RPM limit exceeded (" .. tostring(configured_rpm) .. ")")
                end

                -- Generate or use existing request_id
                local provost_request_id = ngx.var.http_x_provost_request_id
                if not provost_request_id or provost_request_id == "" then
                    -- Generate UUID-like id
                    provost_request_id = ngx.var.request_id or (ngx.now() * 1000000 .. "-" .. math.random(100000, 999999))
                end
                ngx.var.provost_req_id = provost_request_id
                ngx.req.set_header("X-Provost-Request-Id", provost_request_id)

                -- Store context in shared dict for MCP-to-API fallback (900s TTL)
                local ctx_store = ngx.shared.provost_ctx
                local ctx_key = "req:" .. provost_request_id
                ctx_store:set(ctx_key, cjson.encode({
                    user = provost_user,
                    machine = provost_machine,
                    timestamp = ngx.now()
                }), 900)

                -- Store last known identity so MCP-to-API can resolve it
                -- even when MCP strips provost headers on outbound calls
                ctx_store:set("last:user", provost_user, 900)
                ctx_store:set("last:machine", provost_machine, 900)
                ctx_store:set("last:request_id", provost_request_id, 900)

                local req_body = ngx.req.get_body_data()
                if req_body then
                    local function redact_sensitive(raw)
                        if not raw then
                            return raw
                        end
                        local redacted = raw
                        redacted = redacted:gsub('("APCA%-API%-SECRET%-KEY"%s*:%s*")[^"]*"', '%1[REDACTED]"')
                        redacted = redacted:gsub('("APCA%-API%-KEY%-ID"%s*:%s*")[^"]*"', '%1[REDACTED]"')
                        redacted = redacted:gsub('("authorization"%s*:%s*")[^"]*"', '%1[REDACTED]"')
                        redacted = redacted:gsub('("token"%s*:%s*")[^"]*"', '%1[REDACTED]"')
                        return redacted
                    end

                    ngx.var.req_body = redact_sensitive(req_body)
                    local engine  = require "rules_engine"
                    local parsed  = cjson.decode(req_body)
                    if parsed == nil then
                        return reject(400, "INVALID_JSON_BODY", "")
                    end

                    -- Load the current rule set from shared memory (no disk I/O).
                    local context = {
                        user = provost_user,
                        machine = provost_machine,
                        store = ngx.shared.provost_ctx
                    }

                    local blocked, reason = engine.check_request(parsed, rules, context)
                    if blocked then
                        local detail = reason or "Policy violation"
                        local rpc_id = cjson.null
                        if parsed and parsed.id ~= nil then
                            rpc_id = parsed.id
                        end
                        local rpc_error_body = cjson.encode({
                            jsonrpc = "2.0",
                            id = rpc_id,
                            error = {
                                code = -32003,
                                message = "PROVOST_INTERVENTION",
                                data = {
                                    detail = detail
                                }
                            }
                        })
                        return reject(403, "PROVOST_INTERVENTION", detail, {
                            response_body = rpc_error_body
                        })
                    end
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered

                    -- Cache discovered Alpaca account_id from successful account-like payloads.
                    if ngx.status >= 200 and ngx.status < 300 then
                        local cjson = require "cjson.safe"
                        local payload = cjson.decode(buffered)
                        local discovered = payload and (payload.id or payload.account_id)
                        if type(discovered) == "string"
                           and discovered ~= ""
                           and type(payload) == "table"
                           and (payload.account_number or payload.currency or payload.buying_power) then
                            ngx.shared.provost_ctx:set("alpaca:account_id", discovered, 300)
                        end
                    end
                end
            }

            proxy_pass http://alpaca-mcp:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Provost-Request-Id $http_x_provost_request_id;
            proxy_set_header X-Provost-User $http_x_provost_user;
            proxy_set_header X-Provost-Machine $http_x_provost_machine;
            
            # Required for SSE (Server-Sent Events)
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            
            # Echo identity headers for observability
            add_header X-Provost-Request-Id $http_x_provost_request_id always;
            add_header X-Provost-User $http_x_provost_user always;
            add_header X-Provost-Machine $http_x_provost_machine always;
        }
    }

    # ==================================================================
    # MCP-TO-API BOUNDARY: OUTBOUND LEDGER
    # ==================================================================
    server {
        listen 8081;
        server_name localhost;

        access_log syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_mcp_to_api_access json_full;
        error_log  syslog:server=unix:/var/run/provost/fluent-bit.sock,tag=provost_api_to_mcp_error info;

        set $req_body "";
        set $resp_body "";
        set $provost_req_id "";
        set $policy_apca_api_key "";
        set $policy_apca_secret_key "";

        header_filter_by_lua_block {
            local rate_limit = require "rate_limit"

            if ngx.status == 429 then
                rate_limit.enter_cooldown(60)
            end

            local remaining = ngx.header["X-RateLimit-Remaining"]
                or ngx.header["x-ratelimit-remaining"]
                or ngx.header["RateLimit-Remaining"]

            if remaining then
                rate_limit.set_remaining(remaining)
            end
        }

        location /_policy/trading/ {
            internal;
            rewrite ^/_policy/trading(/.*)$ $1 break;
            proxy_pass https://paper-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host paper-api.alpaca.markets;
            proxy_set_header Authorization "";
            proxy_set_header APCA-API-KEY-ID $policy_apca_api_key;
            proxy_set_header APCA-API-SECRET-KEY $policy_apca_secret_key;
            proxy_set_header Connection "";
        }

        location /_policy/broker/ {
            internal;
            rewrite ^/_policy/broker(/.*)$ $1 break;
            proxy_pass https://broker-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host broker-api.alpaca.markets;
            proxy_set_header Authorization "";
            proxy_set_header APCA-API-KEY-ID $policy_apca_api_key;
            proxy_set_header APCA-API-SECRET-KEY $policy_apca_secret_key;
            proxy_set_header Connection "";
        }

        location /trading/ {
            lua_need_request_body on;

            access_by_lua_block {
                local cjson = require "cjson.safe"
                local audit_error = require "audit_error"
                local headers = ngx.req.get_headers() or {}
                local early_request_id = ngx.var.http_x_provost_request_id
                    or headers["X-Provost-Request-Id"]
                    or headers["x-provost-request-id"]
                    or ngx.var.request_id
                    or (ngx.now() * 1000000 .. "-" .. math.random(100000, 999999))

                ngx.var.provost_req_id = early_request_id
                ngx.req.set_header("X-Provost-Request-Id", early_request_id)
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end

                local function reject(status_code, error_code, detail)
                    audit_error.emit("provost_api_to_mcp_error", status_code, error_code, detail, {
                        request_id = early_request_id,
                    })
                    ngx.status = status_code
                    ngx.header["Content-Type"] = "application/json"
                    local response_body
                    if detail and detail ~= "" then
                        response_body = cjson.encode({ error = error_code, detail = detail })
                    else
                        response_body = cjson.encode({ error = error_code })
                    end
                    ngx.var.resp_body = response_body or ""
                    ngx.say(response_body)
                    return ngx.exit(status_code)
                end

                local rate_limit = require "rate_limit"
                if rate_limit.is_cooldown_active() then
                    return reject(429, "PROVOST_COOLDOWN_ACTIVE", "Upstream 429 cooldown active")
                end

                if rate_limit.is_remaining_low() then
                    return reject(429, "PROVOST_RATE_LIMIT_LOW", "Upstream quota is below safe threshold")
                end

                -- Resolve provost identity: try per-request lookup, then last known
                local ctx_store = ngx.shared.provost_ctx
                local provost_request_id = ngx.var.http_x_provost_request_id
                local resolved_user, resolved_machine, resolved_req_id

                if provost_request_id and provost_request_id ~= "" then
                    local ctx_json = ctx_store:get("req:" .. provost_request_id)
                    if ctx_json then
                        local ctx = cjson.decode(ctx_json) or {}
                        resolved_user = ctx.user
                        resolved_machine = ctx.machine
                        resolved_req_id = provost_request_id
                    end
                end

                if not resolved_user or resolved_user == "" then
                    resolved_user = ctx_store:get("last:user")
                    resolved_machine = ctx_store:get("last:machine")
                    resolved_req_id = resolved_req_id or ctx_store:get("last:request_id")
                end

                if not resolved_req_id or resolved_req_id == "" then
                    resolved_req_id = ngx.var.http_x_provost_request_id
                    if not resolved_req_id or resolved_req_id == "" then
                        resolved_req_id = ngx.var.request_id or (ngx.now() * 1000000 .. "-" .. math.random(100000, 999999))
                    end
                end

                ngx.var.provost_req_id = resolved_req_id
                ngx.req.set_header("X-Provost-Request-Id", resolved_req_id)

                if resolved_user and resolved_user ~= "" then
                    ngx.req.set_header("X-Provost-User", resolved_user)
                end
                if resolved_machine and resolved_machine ~= "" then
                    ngx.req.set_header("X-Provost-Machine", resolved_machine)
                end

                if resolved_user and resolved_user ~= "" and resolved_machine and resolved_machine ~= "" then
                    ctx_store:set("req:" .. resolved_req_id, cjson.encode({
                        user = resolved_user,
                        machine = resolved_machine,
                        timestamp = ngx.now()
                    }), 900)
                    ctx_store:set("last:user", resolved_user, 900)
                    ctx_store:set("last:machine", resolved_machine, 900)
                    ctx_store:set("last:request_id", resolved_req_id, 900)
                end

                local http_policy = require "http_policy"
                if not http_policy.enforce("trading") then
                    return
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/trading(/.*)$ $1 break;
            proxy_pass https://paper-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host paper-api.alpaca.markets;
            proxy_set_header X-Provost-Request-Id $http_x_provost_request_id;
            proxy_set_header X-Provost-User $http_x_provost_user;
            proxy_set_header X-Provost-Machine $http_x_provost_machine;
        }

        location /data/ {
            lua_need_request_body on;

            access_by_lua_block {
                local cjson = require "cjson.safe"
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end

                -- Resolve provost identity: try per-request lookup, then last known
                local ctx_store = ngx.shared.provost_ctx
                local provost_request_id = ngx.var.http_x_provost_request_id
                local resolved_user, resolved_machine, resolved_req_id

                if provost_request_id and provost_request_id ~= "" then
                    local ctx_json = ctx_store:get("req:" .. provost_request_id)
                    if ctx_json then
                        local ctx = cjson.decode(ctx_json) or {}
                        resolved_user = ctx.user
                        resolved_machine = ctx.machine
                        resolved_req_id = provost_request_id
                    end
                end

                if not resolved_user or resolved_user == "" then
                    resolved_user = ctx_store:get("last:user")
                    resolved_machine = ctx_store:get("last:machine")
                    resolved_req_id = resolved_req_id or ctx_store:get("last:request_id")
                end

                if resolved_user and resolved_user ~= "" then
                    ngx.req.set_header("X-Provost-User", resolved_user)
                end
                if resolved_machine and resolved_machine ~= "" then
                    ngx.req.set_header("X-Provost-Machine", resolved_machine)
                end
                ngx.var.provost_req_id = resolved_req_id or ""

                local http_policy = require "http_policy"
                if not http_policy.enforce("broker") then
                    return
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/data(/.*)$ $1 break;
            proxy_pass https://data.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host data.alpaca.markets;
            proxy_set_header X-Provost-Request-Id $http_x_provost_request_id;
            proxy_set_header X-Provost-User $http_x_provost_user;
            proxy_set_header X-Provost-Machine $http_x_provost_machine;
        }

        location /broker/ {
            lua_need_request_body on;

            access_by_lua_block {
                local cjson = require "cjson.safe"
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end

                -- Resolve provost identity: try per-request lookup, then last known
                local ctx_store = ngx.shared.provost_ctx
                local provost_request_id = ngx.var.http_x_provost_request_id
                local resolved_user, resolved_machine, resolved_req_id

                if provost_request_id and provost_request_id ~= "" then
                    local ctx_json = ctx_store:get("req:" .. provost_request_id)
                    if ctx_json then
                        local ctx = cjson.decode(ctx_json) or {}
                        resolved_user = ctx.user
                        resolved_machine = ctx.machine
                        resolved_req_id = provost_request_id
                    end
                end

                if not resolved_user or resolved_user == "" then
                    resolved_user = ctx_store:get("last:user")
                    resolved_machine = ctx_store:get("last:machine")
                    resolved_req_id = resolved_req_id or ctx_store:get("last:request_id")
                end

                if resolved_user and resolved_user ~= "" then
                    ngx.req.set_header("X-Provost-User", resolved_user)
                end
                if resolved_machine and resolved_machine ~= "" then
                    ngx.req.set_header("X-Provost-Machine", resolved_machine)
                end
                ngx.var.provost_req_id = resolved_req_id or ""

                local http_policy = require "http_policy"
                if not http_policy.enforce("trading") then
                    return
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/broker(/.*)$ $1 break;
            proxy_pass https://broker-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host broker-api.alpaca.markets;
            proxy_set_header X-Provost-Request-Id $http_x_provost_request_id;
            proxy_set_header X-Provost-User $http_x_provost_user;
            proxy_set_header X-Provost-Machine $http_x_provost_machine;
        }

        # Fallback route for any unprefixed calls.
        location / {
            lua_need_request_body on;

            access_by_lua_block {
                local cjson = require "cjson.safe"
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end

                -- Resolve provost identity: try per-request lookup, then last known
                local ctx_store = ngx.shared.provost_ctx
                local provost_request_id = ngx.var.http_x_provost_request_id
                local resolved_user, resolved_machine, resolved_req_id

                if provost_request_id and provost_request_id ~= "" then
                    local ctx_json = ctx_store:get("req:" .. provost_request_id)
                    if ctx_json then
                        local ctx = cjson.decode(ctx_json) or {}
                        resolved_user = ctx.user
                        resolved_machine = ctx.machine
                        resolved_req_id = provost_request_id
                    end
                end

                if not resolved_user or resolved_user == "" then
                    resolved_user = ctx_store:get("last:user")
                    resolved_machine = ctx_store:get("last:machine")
                    resolved_req_id = resolved_req_id or ctx_store:get("last:request_id")
                end

                if resolved_user and resolved_user ~= "" then
                    ngx.req.set_header("X-Provost-User", resolved_user)
                end
                if resolved_machine and resolved_machine ~= "" then
                    ngx.req.set_header("X-Provost-Machine", resolved_machine)
                end
                ngx.var.provost_req_id = resolved_req_id or ""
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            proxy_pass https://paper-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host paper-api.alpaca.markets;
            proxy_set_header X-Provost-Request-Id $http_x_provost_request_id;
            proxy_set_header X-Provost-User $http_x_provost_user;
            proxy_set_header X-Provost-Machine $http_x_provost_machine;
        }
    }
}
