[FILTER]
    Name          modify
    Match         provost.error
    Rename        log message
    Rename        msg message

[FILTER]
    Name                  parser
    Match                 provost.error
    Key_Name              log
    Parser                provost-error-audit-json
    Reserve_Data          On
    Preserve_Key          On

[FILTER]
    Name                  parser
    Match                 provost.error
    Key_Name              message
    Parser                provost-error-audit-json
    Reserve_Data          On
    Preserve_Key          On

[FILTER]
    Name                  parser
    Match                 provost.error
    Key_Name              audit_json
    Parser                json
    Reserve_Data          On
    Preserve_Key          Off

# Remove the raw nginx error wrapper line - it's noisy and redundant with the
# extracted audit fields above. Keeps the record clean like access logs.
[FILTER]
    Name          modify
    Match         provost.error
    Remove        log
    Remove        audit_json
